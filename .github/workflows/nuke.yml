name: Nuke Test Resources

on:
  # Run after CI completes on merge_group events (merge queue)
  merge_group:
    types: [checks_requested]
  # Manual trigger
  workflow_dispatch:
    inputs:
      all:
        description: "Nuke ALL SDKs"
        type: boolean
        default: false
      aws:
        description: "AWS"
        type: boolean
        default: false
      cloudflare:
        description: "Cloudflare"
        type: boolean
        default: false
      coinbase:
        description: "Coinbase"
        type: boolean
        default: false
      fly-io:
        description: "Fly.io"
        type: boolean
        default: false
      gcp:
        description: "GCP"
        type: boolean
        default: false
      kubernetes:
        description: "Kubernetes"
        type: boolean
        default: false
      mongodb-atlas:
        description: "MongoDB Atlas"
        type: boolean
        default: false
      neon:
        description: "Neon"
        type: boolean
        default: false
      planetscale:
        description: "PlanetScale"
        type: boolean
        default: false
      prisma-postgres:
        description: "Prisma Postgres"
        type: boolean
        default: false
      stripe:
        description: "Stripe"
        type: boolean
        default: false
      supabase:
        description: "Supabase"
        type: boolean
        default: false
      turso:
        description: "Turso"
        type: boolean
        default: false

jobs:
  # ── Gate: decide whether to proceed ──
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - name: Check if merge queue is empty
        if: github.event_name == 'merge_group'
        id: queue-check
        uses: actions/github-script@v7
        with:
          script: |
            const { data: entries } = await github.rest.repos.getMergeQueueForBranch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'main',
            });

            const count = entries.total_count ?? 0;
            console.log(`Merge queue entries remaining: ${count}`);
            core.setOutput('is_last', count <= 1 ? 'true' : 'false');

      - name: Validate inputs
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ "${{ inputs.all }}" != "true" \
             && "${{ inputs.aws }}" != "true" \
             && "${{ inputs.cloudflare }}" != "true" \
             && "${{ inputs.coinbase }}" != "true" \
             && "${{ inputs.fly-io }}" != "true" \
             && "${{ inputs.gcp }}" != "true" \
             && "${{ inputs.kubernetes }}" != "true" \
             && "${{ inputs.mongodb-atlas }}" != "true" \
             && "${{ inputs.neon }}" != "true" \
             && "${{ inputs.planetscale }}" != "true" \
             && "${{ inputs.prisma-postgres }}" != "true" \
             && "${{ inputs.stripe }}" != "true" \
             && "${{ inputs.supabase }}" != "true" \
             && "${{ inputs.turso }}" != "true" ]]; then
            echo "::error::You must select at least one SDK to nuke (or choose 'all')"
            exit 1
          fi

      - name: Decide whether to run
        id: decide
        run: |
          if [[ "${{ github.event_name }}" == "merge_group" ]]; then
            echo "run=${{ steps.queue-check.outputs.is_last }}" >> $GITHUB_OUTPUT
          else
            echo "run=true" >> $GITHUB_OUTPUT
          fi

  # ── AWS ──
  nuke-aws:
    needs: gate
    if: needs.gate.outputs.run == 'true' && (github.event_name == 'merge_group' || inputs.all || inputs.aws)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::391965393224:role/distilled-github-oidc-role
          aws-region: us-east-1

      - name: Install aws-nuke
        run: |
          curl -fsSL "https://github.com/ekristen/aws-nuke/releases/latest/download/aws-nuke-v3-linux-amd64.tar.gz" -o aws-nuke.tar.gz
          tar -xzf aws-nuke.tar.gz
          chmod +x aws-nuke
          sudo mv aws-nuke /usr/local/bin/

      - name: Run aws-nuke
        run: aws-nuke run --config packages/aws/nuke-config.yml --no-alias-check --no-dry-run

