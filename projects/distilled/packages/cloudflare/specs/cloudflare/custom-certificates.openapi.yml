                      lly_assigned_code_elements) can be chosen, such as
                      'country: IN', as well as 'region: EU' which refers to the
                      EU region. If there are too few data centers satisfying
                      the policy, it will be rejected."
                required:
                  - id
                  - bundle_method
                  - expires_on
                  - hosts
                  - issuer
                  - modified_on
                  - priority
                  - signature
                  - status
                  - uploaded_on
                  - zone_id
      x-distilled-response-path: result
    delete:
      operationId: deleteCustomCertificate
      description: "Remove a SSL certificate from a zone.  @example ```ts const
        customCertificate = await client.customCertificates.delete(
        '023e105f4ecef8ad9ca31a8372d0c353', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: customCertificateId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier.
      x-distilled-response-path: result
  /zones/{zone_id}/custom_certificates:
    get:
      operationId: listCustomCertificates
      description: "List, search, and filter all of your custom SSL certificates. The
        higher priority will break ties across overlapping 'legacy_custom'
        certificates, but 'legacy_custom' certificates will always supercede
        'sni_custom' certificates.  @example ```ts // Automatically fetches more
        pages as needed. for await (const customCertificate of
        client.customCertificates.list( { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, )) { // ... } ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
        - name: match
          in: query
          required: false
          description: "Query param: Whether to match all search requirements or at least
            one (any)."
          schema:
            type: string
            enum:
              - any
              - all
        - name: status
          in: query
          required: false
          description: "Query param: Status of the zone's custom SSL."
          schema:
            type: string
