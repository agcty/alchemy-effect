openapi: 3.1.0
info:
  title: Cloudflare KEYLESS-CERTIFICATES API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: keyless-certificates
paths:
  /zones/{zone_id}/keyless_certificates/{keylessCertificateId}:
    get:
      operationId: getKeylessCertificate
      description: "Get details for one Keyless SSL configuration.  @example ```ts
        const keylessCertificate = await client.keylessCertificates.get(
        '023e105f4ecef8ad9ca31a8372d0c353', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: keylessCertificateId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Keyless certificate identifier tag.
                  created_on:
                    type: string
                    description: When the Keyless SSL was created.
                  enabled:
                    type: boolean
                    description: Whether or not the Keyless SSL is on or off.
                  host:
                    type: string
                    description: The keyless SSL name.
                  modified_on:
                    type: string
                    description: When the Keyless SSL was last modified.
                  name:
                    type: string
                    description: The keyless SSL name.
                  permissions:
                    type: array
                    items:
                      type: string
                    description: Available permissions for the Keyless SSL for the current user
                      requesting the item.
                  port:
                    type: number
                    description: The keyless SSL port used to communicate between Cloudflare and the
                      client's Keyless SSL server.
                  status:
                    type: string
                    enum:
                      - active
                      - deleted
                    description: Status of the Keyless SSL.
                  tunnel:
                    type: object
                    properties:
                      private_ip:
                        type: string
                        description: Private IP of the Key Server Host
                      vnet_id:
                        type: string
                        description: Cloudflare Tunnel Virtual Network ID
                    required:
                      - private_ip
                      - vnet_id
                    description: Configuration for using Keyless SSL through a Cloudflare Tunnel
                required:
                  - id
                  - created_on
                  - enabled
                  - host
                  - modified_on
                  - name
                  - permissions
                  - port
                  - status
      x-distilled-response-path: result
    patch:
      operationId: patchKeylessCertificate
      description: "This will update attributes of a Keyless SSL. Consists of one or
        more of the following: host,name,port.  @example ```ts const
        keylessCertificate = await client.keylessCertificates.edit(
        '023e105f4ecef8ad9ca31a8372d0c353', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: keylessCertificateId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                  description: "@deprecated Body param: Whether or not the Keyless SSL is on or
                    off."
                host:
                  type: string
                  description: "Body param: The keyless SSL name."
                name:
                  type: string
                  description: "Body param: The keyless SSL name."
                port:
                  type: number
                  description: "Body param: The keyless SSL port used to communicate between
                    Cloudflare and the client's Keyless SSL server."
                tunnel:
                  type: object
                  properties:
                    private_ip:
                      type: string
                      description: Private IP of the Key Server Host
                    vnet_id:
                      type: string
                      description: Cloudflare Tunnel Virtual Network ID
                  required:
                    - private_ip
                    - vnet_id
                  description: "Body param: Configuration for using Keyless SSL through a
                    Cloudflare Tunnel"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Keyless certificate identifier tag.
                  created_on:
                    type: string
                    description: When the Keyless SSL was created.
                  enabled:
                    type: boolean
                    description: Whether or not the Keyless SSL is on or off.
                  host:
                    type: string
                    description: The keyless SSL name.
                  modified_on:
                    type: string
                    description: When the Keyless SSL was last modified.
                  name:
                    type: string
                    description: The keyless SSL name.
                  permissions:
                    type: array
                    items:
                      type: string
                    description: Available permissions for the Keyless SSL for the current user
                      requesting the item.
                  port:
                    type: number
                    description: The keyless SSL port used to communicate between Cloudflare and the
                      client's Keyless SSL server.
                  status:
                    type: string
                    enum:
                      - active
                      - deleted
                    description: Status of the Keyless SSL.
                  tunnel:
                    type: object
                    properties:
                      private_ip:
                        type: string
                        description: Private IP of the Key Server Host
                      vnet_id:
                        type: string
                        description: Cloudflare Tunnel Virtual Network ID
                    required:
                      - private_ip
                      - vnet_id
                    description: Configuration for using Keyless SSL through a Cloudflare Tunnel
                required:
                  - id
                  - created_on
                  - enabled
                  - host
                  - modified_on
                  - name
                  - permissions
                  - port
                  - status
      x-distilled-response-path: result
    delete:
      operationId: deleteKeylessCertificate
      description: "Delete Keyless SSL Configuration  @example ```ts const
        keylessCertificate = await client.keylessCertificates.delete(
        '023e105f4ecef8ad9ca31a8372d0c353', { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: keylessCertificateId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier.
      x-distilled-response-path: result
  /zones/{zone_id}/keyless_certificates:
    get:
      operationId: listKeylessCertificates
      description: "List all Keyless SSL configurations for a given zone.  @example
        ```ts // Automatically fetches more pages as needed. for await (const
        keylessCertificate of client.keylessCertificates.list( { zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, )) { // ... } ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Keyless certificate identifier tag.
                  created_on:
                    type: string
                    description: When the Keyless SSL was created.
                  enabled:
                    type: boolean
                    description: Whether or not the Keyless SSL is on or off.
                  host:
                    type: string
                    description: The keyless SSL name.
                  modified_on:
                    type: string
                    description: When the Keyless SSL was last modified.
                  name:
                    type: string
                    description: The keyless SSL name.
                  permissions:
                    type: array
                    items:
                      type: string
                    description: Available permissions for the Keyless SSL for the current user
                      requesting the item.
                  port:
                    type: number
                    description: The keyless SSL port used to communicate between Cloudflare and the
                      client's Keyless SSL server.
                  status:
                    type: string
                    enum:
                      - active
                      - deleted
                    description: Status of the Keyless SSL.
                  tunnel:
                    type: object
                    properties:
                      private_ip:
                        type: string
                        description: Private IP of the Key Server Host
                      vnet_id:
                        type: string
                        description: Cloudflare Tunnel Virtual Network ID
                    required:
                      - private_ip
                      - vnet_id
                    description: Configuration for using Keyless SSL through a Cloudflare Tunnel
                required:
                  - id
                  - created_on
                  - enabled
                  - host
                  - modified_on
                  - name
                  - permissions
                  - port
                  - status
      x-distilled-pagination-class: KeylessCertificatesSinglePage
