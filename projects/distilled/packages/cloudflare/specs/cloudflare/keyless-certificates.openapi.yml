        uXtA8hWn6fK6eISD9HBdcAFToUvKNZ1BIDPvh9f95Ine8ar6yGd56TUNrHR8eHBs
        ESxz5ddVR/oWRysNJ+aGAyYqHS8S/ttmC7r4XCAHqXptkHPCGRqkAhsterYhd4I8
        /cBzejUobNCjjHFbtkAL/SjxZOLW+pNkZwfeYdM8iPkD54Uua1v2tdw= -----END
        CERTIFICATE-----', host: 'example.com', port: 24008, }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                certificate:
                  type: string
                  description: "Body param: The zone's SSL certificate or SSL certificate and
                    intermediate(s)."
                host:
                  type: string
                  description: "Body param: The keyless SSL name."
                port:
                  type: number
                  description: "Body param: The keyless SSL port used to communicate between
                    Cloudflare and the client's Keyless SSL server."
                bundle_method:
                  type: string
                  enum:
                    - ubiquitous
                    - optimal
                    - force
                  description: "Body param: A ubiquitous bundle has the highest probability of
                    being verified everywhere, even by clients using outdated or
                    unusual trust stores. An optimal bundle uses the shortest
                    chain and newest intermediates. And the force bundle
                    verifies the chain, but does not otherwise modify it."
                name:
                  type: string
                  description: "Body param: The keyless SSL name."
                tunnel:
                  type: object
                  properties:
