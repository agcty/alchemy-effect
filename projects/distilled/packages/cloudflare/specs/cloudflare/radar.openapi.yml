                                    - IQI
                                    - LEAKED_CREDENTIALS
                                    - NET
                                    - ROBOTS_TXT
                                    - SPEED
                                    - WORKERS_AI
                                  description: Data source for annotations.
                                description:
                                  type: string
                                endDate:
                                  type: string
                                eventType:
                                  type: string
                                  enum:
                                    - EVENT
                                    - GENERAL
                                    - OUTAGE
                                    - PARTIAL_PROJECTION
                                    - PIPELINE
                                    - TRAFFIC_ANOMALY
                                  description: Event type for annotations.
                                isInstantaneous:
                                  type: boolean
                                  description: Whether event is a single point in time or a time range.
                                linkedUrl:
                                  type: string
                                startDate:
                                  type: string
                              required:
                                - dataSource
                                - description
                                - endDate
                                - eventType
                                - isInstantaneous
                                - linkedUrl
                                - startDate
                          level:
                            type: number
                            description: Provides an indication of how much confidence Cloudflare has in the
                              data.
                        required:
                          - annotations
                          - level
                      dateRange:
                        type: array
                        items:
                          type: object
                          properties:
                            endTime:
                              type: string
                              description: Adjusted end of date range.
                            startTime:
                              type: string
                              description: Adjusted start of date range.
                          required:
                            - endTime
                            - startTime
                      lastUpdated:
                        type: string
                        description: Timestamp of the last dataset update.
                      normalization:
                        type: string
                        enum:
                          - PERCENTAGE
                          - MIN0_MAX
                          - MIN_MAX
                          - RAW_VALUES
                          - PERCENTAGE_CHANGE
                          - ROLLING_AVERAGE
                          - OVERLAPPED_PERCENTAGE
