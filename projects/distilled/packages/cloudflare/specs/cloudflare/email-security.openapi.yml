          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                destination:
                  type: string
                  enum:
                    - Inbox
                    - JunkEmail
                    - DeletedItems
                    - RecoverableItemsDeletions
                    - RecoverableItemsPurges
                  description: "Body param:"
                postfix_ids:
                  type: array
                  items:
                    type: string
                  description: "Body param:"
              required:
                - destination
                - postfix_ids
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  completed_timestamp:
                    type: string
                  item_count:
                    type: number
                    description: "@deprecated"
                  success:
                    type: boolean
                  destination:
                    oneOf:
                      - type: string
                    nullable: true
                  message_id:
                    oneOf:
                      - type: string
                    nullable: true
                  operation:
                    oneOf:
                      - type: string
                    nullable: true
                  recipient:
                    oneOf:
                      - type: string
                    nullable: true
                  status:
                    oneOf:
                      - type: string
                    nullable: true
                required:
                  - completed_timestamp
                  - item_count
                  - success
      x-distilled-pagination-class: MoveBulkResponsesSinglePage
  /accounts/{account_id}/email-security/investigate/{postfixId}/preview:
    get:
      operationId: getInvestigatePreview
      description: "Returns a preview of the message body as a base64 encoded PNG
        image for non-benign messages.  @example ```ts const preview = await
        client.emailSecurity.investigate.preview.get( '4Njp3P0STMz2c02Q', {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: postfixId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account Identifier
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  screenshot:
                    type: string
                    description: A base64 encoded PNG image of the email.
                required:
                  - screenshot
      x-distilled-response-path: result
  /accounts/{account_id}/email-security/investigate/preview:
    post:
      operationId: createInvestigatePreview
      description: "Preview for non-detection messages  @example ```ts const preview =
        await client.emailSecurity.investigate.preview.create({ account_id:
        '023e105f4ecef8ad9ca31a8372d0c353', postfix_id: '4Njp3P0STMz2c02Q', });
        ```"
      parameters:
