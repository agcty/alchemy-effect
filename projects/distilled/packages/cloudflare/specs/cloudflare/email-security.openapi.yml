openapi: 3.1.0
info:
  title: Cloudflare EMAIL-SECURITY API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: email-security
paths:
  /accounts/{account_id}/email-security/investigate/{postfixId}:
    get:
      operationId: getInvestigate
      description: "Get message details  @example ```ts const investigate = await
        client.emailSecurity.investigate.get( '4Njp3P0STMz2c02Q', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: postfixId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account Identifier
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  action_log: {}
                  client_recipients:
                    type: array
                    items:
                      type: string
                  detection_reasons:
                    type: array
                    items:
                      type: string
                  is_phish_submission:
                    type: boolean
                  is_quarantined:
                    type: boolean
                  postfix_id:
                    type: string
                    description: The identifier of the message.
                  properties:
                    type: object
                    properties:
                      allowlisted_pattern:
                        type: string
                      allowlisted_pattern_type:
                        type: string
                        enum:
                          - quarantine_release
                          - acceptable_sender
                          - allowed_sender
                          - allowed_recipient
                          - domain_similarity
                          - domain_recency
                          - managed_acceptable_sender
                          - outbound_ndr
                      blocklisted_message:
                        type: boolean
                      blocklisted_pattern:
                        type: string
                      whitelisted_pattern_type:
                        type: string
                        enum:
                          - quarantine_release
                          - acceptable_sender
                          - allowed_sender
                          - allowed_recipient
                          - domain_similarity
                          - domain_recency
                          - managed_acceptable_sender
                          - outbound_ndr
                  ts:
                    type: string
                  alert_id:
                    oneOf:
                      - type: string
                    nullable: true
                  delivery_mode:
                    type: string
                    enum:
                      - DIRECT
                      - BCC
                      - JOURNAL
                      - REVIEW_SUBMISSION
                      - DMARC_UNVERIFIED
                      - DMARC_FAILURE_REPORT
                      - DMARC_AGGREGATE_REPORT
                      - THREAT_INTEL_SUBMISSION
                      - SIMULATION_SUBMISSION
                      - API
                      - RETRO_SCAN
                    nullable: true
                  edf_hash:
                    oneOf:
                      - type: string
                    nullable: true
                  envelope_from:
                    oneOf:
                      - type: string
                    nullable: true
                  envelope_to:
                    oneOf:
                      - type: array
                        items:
                          type: string
                    nullable: true
                  final_disposition:
                    type: string
                    enum:
                      - MALICIOUS
                      - MALICIOUS-BEC
                      - SUSPICIOUS
                      - SPOOF
                      - SPAM
                      - BULK
                      - ENCRYPTED
                      - EXTERNAL
                      - UNKNOWN
                      - NONE
                    nullable: true
                  findings:
                    oneOf:
                      - type: array
                        items:
                          type: object
                          properties:
                            attachment:
                              oneOf:
                                - type: string
                              nullable: true
                            detail:
                              oneOf:
                                - type: string
                              nullable: true
                            detection:
                              type: string
                              enum:
                                - MALICIOUS
                                - MALICIOUS-BEC
                                - SUSPICIOUS
                                - SPOOF
                                - SPAM
                                - BULK
                                - ENCRYPTED
                                - EXTERNAL
                                - UNKNOWN
                                - NONE
                              nullable: true
                            field:
                              oneOf:
                                - type: string
                              nullable: true
                            name:
                              oneOf:
                                - type: string
                              nullable: true
                            portion:
                              oneOf:
                                - type: string
                              nullable: true
                            reason:
                              oneOf:
                                - type: string
                              nullable: true
                            score:
                              oneOf:
                                - type: number
                              nullable: true
                            value:
                              oneOf:
                                - type: string
                              nullable: true
                    nullable: true
                  from:
                    oneOf:
                      - type: string
                    nullable: true
                  from_name:
                    oneOf:
                      - type: string
                    nullable: true
                  htmltext_structure_hash:
                    oneOf:
                      - type: string
                    nullable: true
                  message_id:
                    oneOf:
                      - type: string
                    nullable: true
                  postfix_id_outbound:
                    oneOf:
                      - type: string
                    nullable: true
                  replyto:
                    oneOf:
                      - type: string
                    nullable: true
                  sent_date:
                    oneOf:
                      - type: string
                    nullable: true
                  subject:
                    oneOf:
                      - type: string
                    nullable: true
                  threat_categories:
                    oneOf:
                      - type: array
                        items:
                          type: string
                    nullable: true
                  to:
                    oneOf:
                      - type: array
                        items:
                          type: string
                    nullable: true
                  to_name:
                    oneOf:
                      - type: array
                        items:
                          type: string
                    nullable: true
                  validation:
                    oneOf:
                      - type: object
                        properties:
                          comment:
                            oneOf:
                              - type: string
                            nullable: true
                          dkim:
                            type: string
                            enum:
                              - pass
                              - neutral
                              - fail
                              - error
                              - none
                            nullable: true
                          dmarc:
                            type: string
                            enum:
                              - pass
                              - neutral
                              - fail
                              - error
                              - none
                            nullable: true
                          spf:
                            type: string
                            enum:
                              - pass
                              - neutral
                              - fail
                              - error
                              - none
                            nullable: true
                    nullable: true
                required:
                  - id
                  - action_log
                  - client_recipients
                  - detection_reasons
                  - is_phish_submission
                  - is_quarantined
                  - postfix_id
                  - properties
                  - ts
      x-distilled-response-path: result
  /accounts/{account_id}/email-security/investigate:
    get:
      operationId: listInvestigates
      description: "Returns information for each email that matches the search
        parameter(s). If the search takes too long, the endpoint returns 202
        with a Location header pointing to a polling endpoint where results can
        be retrieved once ready.  @example ```ts // Automatically fetches more
        pages as needed. for await (const investigateListResponse of
        client.emailSecurity.investigate.list( { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, )) { // ... } ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Account Identifier"
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: number
        - name: per_page
          in: query
          required: false
          schema:
            type: number
        - name: action_log
          in: query
          required: false
          description: "Query param: Determines if the message action log is included in
            the response."
          schema:
            type: boolean
        - name: alert_id
          in: query
          required: false
          description: "Query param:"
          schema:
            type: string
        - name: cursor
          in: query
          required: false
          description: "Query param:"
          schema:
            type: string
        - name: detections_only
          in: query
          required: false
          description: "Query param: Determines if the search results will include
            detections or not."
          schema:
            type: boolean
        - name: domain
          in: query
          required: false
          description: "Query param: The sender domains the search filters by."
          schema:
            type: string
        - name: end
          in: query
          required: false
          description: "Query param: The end of the search date range. Defaults to `now`."
          schema:
            type: string
        - name: final_disposition
          in: query
          required: false
          description: "Query param: The dispositions the search filters by."
          schema:
            type: string
            enum:
              - MALICIOUS
              - SUSPICIOUS
              - SPOOF
              - SPAM
              - BULK
              - NONE
        - name: message_action
          in: query
          required: false
          description: "Query param: The message actions the search filters by."
          schema:
            type: string
            enum:
              - PREVIEW
              - QUARANTINE_RELEASED
              - MOVED
        - name: message_id
          in: query
          required: false
          description: "Query param:"
          schema:
            type: string
        - name: metric
          in: query
          required: false
          description: "Query param:"
          schema:
            type: string
        - name: query
          in: query
          required: false
          description: "Query param: The space-delimited term used in the query. The
            search is case-insensitive.  The content of the following email
            metadata fields are searched:  - alert_id - CC - From
            (envelope_from) - From Name - final_disposition - md5 hash (of any
            attachment) - sha1 hash (of any attachment) - sha256 hash (of any
            attachment) - name (of any attachment) - Reason - Received DateTime
            (yyyy-mm-ddThh:mm:ss) - Sent DateTime (yyyy-mm-ddThh:mm:ss) -
            ReplyTo - To (envelope_to) - To Name - Message-ID -
            smtp_helo_server_ip - smtp_previous_hop_ip - x_originating_ip -
            Subject"
          schema:
            type: string
        - name: recipient
          in: query
          required: false
          description: "Query param:"
          schema:
            type: string
        - name: sender
          in: query
          required: false
          description: "Query param:"
          schema:
            type: string
        - name: start
          in: query
          required: false
          description: "Query param: The beginning of the search date range. Defaults to
            `now - 30 days`."
          schema:
            type: string
        - name: subject
          in: query
          required: false
          description: "Query param:"
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  action_log: {}
                  client_recipients:
                    type: array
                    items:
                      type: string
                  detection_reasons:
                    type: array
                    items:
                      type: string
                  is_phish_submission:
                    type: boolean
                  is_quarantined:
                    type: boolean
                  postfix_id:
                    type: string
                    description: The identifier of the message.
                  properties:
                    type: object
                    properties:
                      allowlisted_pattern:
                        type: string
                      allowlisted_pattern_type:
                        type: string
                        enum:
                          - quarantine_release
                          - acceptable_sender
                          - allowed_sender
                          - allowed_recipient
                          - domain_similarity
                          - domain_recency
                          - managed_acceptable_sender
                          - outbound_ndr
                      blocklisted_message:
                        type: boolean
                      blocklisted_pattern:
                        type: string
                      whitelisted_pattern_type:
                        type: string
                        enum:
                          - quarantine_release
                          - acceptable_sender
                          - allowed_sender
                          - allowed_recipient
                          - domain_similarity
                          - domain_recency
                          - managed_acceptable_sender
                          - outbound_ndr
                  ts:
                    type: string
                  alert_id:
                    oneOf:
                      - type: string
                    nullable: true
                  delivery_mode:
                    type: string
                    enum:
                      - DIRECT
                      - BCC
                      - JOURNAL
                      - REVIEW_SUBMISSION
                      - DMARC_UNVERIFIED
                      - DMARC_FAILURE_REPORT
                      - DMARC_AGGREGATE_REPORT
                      - THREAT_INTEL_SUBMISSION
                      - SIMULATION_SUBMISSION
                      - API
                      - RETRO_SCAN
                    nullable: true
                  edf_hash:
                    oneOf:
                      - type: string
                    nullable: true
                  envelope_from:
                    oneOf:
                      - type: string
                    nullable: true
                  envelope_to:
                    oneOf:
                      - type: array
                        items:
                          type: string
                    nullable: true
                  final_disposition:
                    type: string
                    enum:
                      - MALICIOUS
                      - MALICIOUS-BEC
                      - SUSPICIOUS
                      - SPOOF
                      - SPAM
                      - BULK
                      - ENCRYPTED
                      - EXTERNAL
                      - UNKNOWN
                      - NONE
                    nullable: true
                  findings:
                    oneOf:
                      - type: array
                        items:
                          type: object
                          properties:
                            attachment:
                              oneOf:
                                - type: string
                              nullable: true
                            detail:
                              oneOf:
                                - type: string
                              nullable: true
                            detection:
                              type: string
                              enum:
                                - MALICIOUS
                                - MALICIOUS-BEC
                                - SUSPICIOUS
                                - SPOOF
                                - SPAM
                                - BULK
                                - ENCRYPTED
                                - EXTERNAL
                                - UNKNOWN
                                - NONE
                              nullable: true
                            field:
                              oneOf:
                                - type: string
                              nullable: true
                            name:
                              oneOf:
                                - type: string
                              nullable: true
                            portion:
                              oneOf:
                                - type: string
                              nullable: true
                            reason:
                              oneOf:
                                - type: string
                              nullable: true
                            score:
                              oneOf:
                                - type: number
                              nullable: true
                            value:
                              oneOf:
                                - type: string
                              nullable: true
                    nullable: true
                  from:
                    oneOf:
                      - type: string
                    nullable: true
                  from_name:
                    oneOf:
                      - type: string
                    nullable: true
                  htmltext_structure_hash:
                    oneOf:
                      - type: string
                    nullable: true
                  message_id:
                    oneOf:
                      - type: string
                    nullable: true
                  postfix_id_outbound:
                    oneOf:
                      - type: string
                    nullable: true
                  replyto:
                    oneOf:
                      - type: string
                    nullable: true
                  sent_date:
                    oneOf:
                      - type: string
                    nullable: true
                  subject:
                    oneOf:
                      - type: string
                    nullable: true
                  threat_categories:
                    oneOf:
                      - type: array
                        items:
                          type: string
                    nullable: true
                  to:
                    oneOf:
                      - type: array
                        items:
                          type: string
                    nullable: true
                  to_name:
                    oneOf:
                      - type: array
                        items:
                          type: string
                    nullable: true
                  validation:
                    oneOf:
                      - type: object
                        properties:
                          comment:
                            oneOf:
                              - type: string
                            nullable: true
                          dkim:
                            type: string
                            enum:
                              - pass
                              - neutral
                              - fail
                              - error
                              - none
                            nullable: true
                          dmarc:
                            type: string
                            enum:
                              - pass
                              - neutral
                              - fail
                              - error
                              - none
                            nullable: true
                          spf:
                            type: string
                            enum:
                              - pass
                              - neutral
                              - fail
                              - error
                              - none
                            nullable: true
                    nullable: true
                required:
                  - id
                  - action_log
                  - client_recipients
                  - detection_reasons
                  - is_phish_submission
                  - is_quarantined
                  - postfix_id
                  - properties
                  - ts
      x-distilled-pagination-class: InvestigateListResponsesV4PagePaginationArray
  /accounts/{account_id}/email-security/investigate/{postfixId}/detections:
    get:
      operationId: getInvestigateDetection
      description: "Returns detection details such as threat categories and sender
        information for non-benign messages.  @example ```ts const detection =
        await client.emailSecurity.investigate.detections.get(
        '4Njp3P0STMz2c02Q', { account_id: '023e105f4ecef8ad9ca31a8372d0c353' },
        ); ```"
      parameters:
        - name: postfixId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account Identifier
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  action:
                    type: string
                  attachments:
                    type: array
                    items:
                      type: object
                      properties:
                        size:
                          type: number
                        content_type:
                          oneOf:
                            - type: string
                          nullable: true
                        detection:
                          type: string
                          enum:
                            - MALICIOUS
                            - MALICIOUS-BEC
                            - SUSPICIOUS
                            - SPOOF
                            - SPAM
                            - BULK
                            - ENCRYPTED
                            - EXTERNAL
                            - UNKNOWN
                            - NONE
                          nullable: true
                        encrypted:
                          oneOf:
                            - type: boolean
                          nullable: true
                        name:
                          oneOf:
                            - type: string
                          nullable: true
                      required:
                        - size
                  headers:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        value:
                          type: string
                      required:
                        - name
                        - value
                  links:
                    type: array
                    items:
                      type: object
                      properties:
                        href:
                          type: string
                        text:
                          oneOf:
                            - type: string
                          nullable: true
                      required:
                        - href
                  sender_info:
                    type: object
                    properties:
                      as_name:
                        oneOf:
                          - type: string
                        nullable: true
                        description: The name of the autonomous system.
                      as_number:
                        oneOf:
                          - type: number
                        nullable: true
                        description: The number of the autonomous system.
                      geo:
                        oneOf:
                          - type: string
                        nullable: true
                      ip:
                        oneOf:
                          - type: string
                        nullable: true
                      pld:
                        oneOf:
                          - type: string
                        nullable: true
                  threat_categories:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                        description:
                          oneOf:
                            - type: string
                          nullable: true
                        name:
                          oneOf:
                            - type: string
                          nullable: true
                      required:
                        - id
                  validation:
                    type: object
                    properties:
                      comment:
                        oneOf:
                          - type: string
                        nullable: true
                      dkim:
                        type: string
                        enum:
                          - pass
                          - neutral
                          - fail
                          - error
                          - none
                        nullable: true
                      dmarc:
                        type: string
                        enum:
                          - pass
                          - neutral
                          - fail
                          - error
                          - none
                        nullable: true
                      spf:
                        type: string
                        enum:
                          - pass
                          - neutral
                          - fail
                          - error
                          - none
                        nullable: true
                  final_disposition:
                    type: string
                    enum:
                      - MALICIOUS
                      - MALICIOUS-BEC
                      - SUSPICIOUS
                      - SPOOF
                      - SPAM
                      - BULK
                      - ENCRYPTED
                      - EXTERNAL
                      - UNKNOWN
                      - NONE
                    nullable: true
                required:
                  - action
                  - attachments
                  - headers
                  - links
                  - sender_info
                  - threat_categories
                  - validation
      x-distilled-response-path: result
  /accounts/{account_id}/email-security/investigate/{postfixId}/move:
    post:
      operationId: createInvestigateMove
      description: "Move a message  @example ```ts // Automatically fetches more pages
        as needed. for await (const moveCreateResponse of
        client.emailSecurity.investigate.move.create( '4Njp3P0STMz2c02Q', {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353', destination: 'Inbox', },
        )) { // ... } ```"
      parameters:
        - name: postfixId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Account Identifier"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                destination:
                  type: string
                  enum:
                    - Inbox
                    - JunkEmail
                    - DeletedItems
                    - RecoverableItemsDeletions
                    - RecoverableItemsPurges
                  description: "Body param:"
              required:
                - destination
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  completed_timestamp:
                    type: string
                  item_count:
                    type: number
                    description: "@deprecated"
                  success:
                    type: boolean
                  destination:
                    oneOf:
                      - type: string
                    nullable: true
                  message_id:
                    oneOf:
                      - type: string
                    nullable: true
                  operation:
                    oneOf:
                      - type: string
                    nullable: true
                  recipient:
                    oneOf:
                      - type: string
                    nullable: true
                  status:
                    oneOf:
                      - type: string
                    nullable: true
                required:
                  - completed_timestamp
                  - item_count
                  - success
      x-distilled-pagination-class: MoveCreateResponsesSinglePage
  /accounts/{account_id}/email-security/investigate/move:
    post:
      operationId: bulkInvestigateMove
      description: "Move multiple messages  @example ```ts // Automatically fetches
        more pages as needed. for await (const moveBulkResponse of
