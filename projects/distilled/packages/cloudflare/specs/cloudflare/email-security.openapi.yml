        '023e105f4ecef8ad9ca31a8372d0c353', destination: 'Inbox', postfix_ids:
        ['4Njp3P0STMz2c02Q'], }, )) { // ... } ```"
      parameters:
        - name: account_id
          in: path
          required: true
