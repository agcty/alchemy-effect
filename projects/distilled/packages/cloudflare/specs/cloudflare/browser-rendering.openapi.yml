  /accounts/{account_id}/browser-rendering/snapshot:
    post:
      operationId: createSnapshot
      description: "Returns the page's HTML content and screenshot. Control page
        loading with `gotoOptions` and `waitFor ` options. Customize screenshots
        with `viewport`, `fullPage`, `clip` and others.  @example ```ts const
        snapshot = await client.browserRendering.snapshot.create({ account_id:
        'account_id', html: '<h1>Hello World!</h1>', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Account ID."
          schema:
            type: string
        - name: cacheTTL
          in: query
          required: false
          description: "Query param: Cache TTL default is 5s. Set to 0 to disable."
          schema:
            type: number
