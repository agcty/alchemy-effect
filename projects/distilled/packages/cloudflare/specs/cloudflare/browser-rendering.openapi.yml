openapi: 3.1.0
info:
  title: Cloudflare BROWSER-RENDERING API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: browser-rendering
paths:
  /accounts/{account_id}/browser-rendering/content:
    post:
      operationId: createContent
      description: "Fetches rendered HTML content from provided URL or HTML. Check
        available options like `gotoOptions` and `waitFor ` to control page load
        behaviour.  @example ```ts const content = await
        client.browserRendering.content.create({ account_id: 'account_id', url:
        'https://www.example.com/', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Account ID."
          schema:
            type: string
        - name: cacheTTL
          in: query
          required: false
          description: "Query param: Cache TTL default is 5s. Set to 0 to disable."
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  description: "Body param: URL to navigate to, eg. `https://example.com`."
                actionTimeout:
                  type: number
                  description: "Body param: The maximum duration allowed for the browser action to
                    complete after the page has loaded (such as taking
                    screenshots, extracting content, or generating PDFs). If
                    this time limit is exceeded, the action stops and returns a
                    timeout error."
                addScriptTag:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      content:
                        type: string
                      type:
                        type: string
                      url:
                        type: string
                  description: "Body param: Adds a `<script>` tag into the page with the desired
                    URL or content."
                addStyleTag:
                  type: array
                  items:
                    type: object
                    properties:
                      content:
                        type: string
                      url:
                        type: string
                  description: 'Body param: Adds a `<link rel="stylesheet">` tag into the page
                    with the desired URL or a `<style type="text/css">` tag with
                    the content.'
                allowRequestPattern:
                  type: array
                  items:
                    type: string
                  description: "Body param: Only allow requests that match the provided regex
                    patterns, eg. '/^.\\ \\.(css)'."
                allowResourceTypes:
                  type: array
                  items:
                    type: string
                    enum:
                      - document
                      - stylesheet
                      - image
                      - media
                      - font
                      - script
                      - texttrack
                      - xhr
                      - fetch
                      - prefetch
                      - eventsource
                      - websocket
                      - manifest
                      - signedexchange
                      - ping
                      - cspviolationreport
                      - preflight
                      - other
                  description: "Body param: Only allow requests that match the provided resource
                    types, eg. 'image' or 'script'."
                authenticate:
                  type: object
                  properties:
                    password:
                      type: string
                    username:
                      type: string
                  required:
                    - password
                    - username
                  description: "Body param: Provide credentials for HTTP authentication."
                bestAttempt:
                  type: boolean
                  description: "Body param: Attempt to proceed when 'awaited' events fail or
                    timeout."
                cookies:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                      domain:
                        type: string
                      expires:
                        type: number
                      httpOnly:
                        type: boolean
                      partitionKey:
                        type: string
                      path:
                        type: string
                      priority:
                        type: string
                        enum:
                          - Low
                          - Medium
                          - High
                      sameParty:
                        type: boolean
                      sameSite:
                        type: string
                        enum:
                          - Strict
                          - Lax
                          - None
                      secure:
                        type: boolean
                      sourcePort:
                        type: number
                      sourceScheme:
                        type: string
                        enum:
                          - Unset
                          - NonSecure
                          - Secure
                      url:
                        type: string
                    required:
                      - name
                      - value
                  description: "Body param: Check
                    [options](https://pptr.dev/api/puppeteer.page.setcookie)."
                emulateMediaType:
                  type: string
                  description: "Body param:"
                gotoOptions:
                  type: object
                  properties:
                    referer:
                      type: string
                    referrerPolicy:
                      type: string
                    timeout:
                      type: number
                    waitUntil:
                      oneOf:
                        - type: string
                          enum:
                            - load
                        - type: string
                          enum:
                            - domcontentloaded
                        - type: string
                          enum:
                            - networkidle0
                        - type: string
                          enum:
                            - networkidle2
                        - type: array
                          items:
                            type: string
                            enum:
                              - load
                              - domcontentloaded
                              - networkidle0
                              - networkidle2
                  description: "Body param: Check
                    [options](https://pptr.dev/api/puppeteer.gotooptions)."
                rejectRequestPattern:
                  type: array
                  items:
                    type: string
                  description: "Body param: Block undesired requests that match the provided regex
                    patterns, eg. '/^.\\ \\.(css)'."
                rejectResourceTypes:
                  type: array
                  items:
                    type: string
                    enum:
                      - document
                      - stylesheet
                      - image
                      - media
                      - font
                      - script
                      - texttrack
                      - xhr
                      - fetch
                      - prefetch
                      - eventsource
                      - websocket
                      - manifest
                      - signedexchange
                      - ping
                      - cspviolationreport
                      - preflight
                      - other
                  description: "Body param: Block undesired requests that match the provided
                    resource types, eg. 'image' or 'script'."
                setExtraHTTPHeaders:
                  type: object
                  additionalProperties: true
                  description: "Body param:"
                setJavaScriptEnabled:
                  type: boolean
                  description: "Body param:"
                userAgent:
                  type: string
                  description: "Body param:"
                viewport:
                  type: object
                  properties:
                    height:
                      type: number
                    width:
                      type: number
                    deviceScaleFactor:
                      type: number
                    hasTouch:
                      type: boolean
                    isLandscape:
                      type: boolean
                    isMobile:
                      type: boolean
                  required:
                    - height
                    - width
                  description: "Body param: Check
                    [options](https://pptr.dev/api/puppeteer.page.setviewport)."
                waitForSelector:
                  type: object
                  properties:
                    selector:
                      type: string
                    hidden:
                      type: boolean
                      enum:
                        - true
                    timeout:
                      type: number
                    visible:
                      type: boolean
                      enum:
                        - true
                  required:
                    - selector
                  description: "Body param: Wait for the selector to appear in page. Check
                    [options](https://pptr.dev/api/puppeteer.page.waitforselect\
                    or)."
                waitForTimeout:
                  type: number
                  description: "Body param: Waits for a specified timeout before continuing."
              required:
                - url
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: string
      x-distilled-response-path: result
