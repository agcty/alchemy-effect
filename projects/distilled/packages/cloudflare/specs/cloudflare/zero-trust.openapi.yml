    post:
      operationId: createAccessApplicationPolicy
      description: "Creates a policy applying exclusive to a single application that
        defines the users or groups who can reach it. We recommend creating a
        reusable policy instead and subsequently referencing its ID in the
        application's 'policies' array.  @example ```ts const policy = await
        client.zeroTrust.access.applications.policies.create(
        'f174e90a-fafe-4643-bbbc-4a0ed4fc8415', { account_id: 'account_id' }, );
        ```"
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: The Account ID to use for this endpoint. Mutually
            exclusive with the Zone ID."
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: "Path param: The Zone ID to use for this endpoint. Mutually
            exclusive with the Account ID."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                approval_groups:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                  description: "Body param: Administrators who can approve a temporary
                    authentication request."
                approval_required:
                  type: boolean
                  description: "Body param: Requires the user to request access from an
                    administrator at the start of each session."
                isolation_required:
                  type: boolean
                  description: "Body param: Require this application to be served in an isolated
                    browser for users matching this policy. 'Client Web
                    Isolation' must be on for the account in order to use this
                    feature."
                precedence:
                  type: number
                  description: "Body param: The order of execution for this policy. Must be unique
                    for each policy within an app."
                purpose_justification_prompt:
                  type: string
                  description: "Body param: A custom message that will appear on the purpose
                    justification screen."
                purpose_justification_required:
                  type: boolean
                  description: "Body param: Require users to enter a justification when they log
                    in to the application."
                session_duration:
                  type: string
                  description: "Body param: The amount of time that tokens issued for the
                    application will be valid. Must be in the format `300ms` or
                    `2h45m`. Valid time units are: ns, us (or µs), ms, s, m, h."
      responses:
