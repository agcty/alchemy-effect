    get:
      operationId: getTunnelCloudflaredConnection
      description: "Fetches connection details for a Cloudflare Tunnel.  @example
        ```ts // Automatically fetches more pages as needed. for await (const
        client of client.zeroTrust.tunnels.cloudflared.connections.get(
        'f70ff985-a4ef-4643-bbbc-4a0ed4fc8415', { account_id:
        '699d98642c564d2e855e9661899b7252' }, )) { // ... } ```"
      parameters:
        - name: tunnelId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Cloudflare account ID
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: UUID of the Cloudflare Tunnel connection.
                  arch:
                    type: string
                    description: The cloudflared OS architecture used to establish this connection.
                  config_version:
                    type: number
                    description: The version of the remote tunnel configuration. Used internally to
                      sync cloudflared with the Zero Trust dashboard.
                  conns:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: UUID of the Cloudflare Tunnel connection.
                        client_id:
                          type: string
                          description: UUID of the Cloudflare Tunnel connector.
                        client_version:
                          type: string
                          description: The cloudflared version used to establish this connection.
                        colo_name:
                          type: string
                          description: The Cloudflare data center used for this connection.
                        is_pending_reconnect:
                          type: boolean
                          description: Cloudflare continues to track connections for several minutes after
                            they disconnect. This is an optimization to improve
                            latency and reliability of reconnecting. If `true`,
                            the connection has disconnected but is still being
                            tracked. If `false`, the connection is actively
                            serving traffic.
                        opened_at:
                          type: string
                          description: Timestamp of when the connection was established.
                        origin_ip:
                          type: string
                          description: The public IP address of the host running cloudflared.
                        uuid:
                          type: string
                          description: UUID of the Cloudflare Tunnel connection.
                    description: The Cloudflare Tunnel connections between your origin and
                      Cloudflare's edge.
                  features:
                    type: array
                    items:
                      type: string
                    description: Features enabled for the Cloudflare Tunnel.
                  run_at:
                    type: string
                    description: Timestamp of when the tunnel connection was started.
                  version:
                    type: string
                    description: The cloudflared version used to establish this connection.
