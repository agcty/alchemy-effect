    post:
      operationId: createGatewayRule
      description: "Create a new Zero Trust Gateway rule.  @example ```ts const
        gatewayRule = await client.zeroTrust.gateway.rules.create({ account_id:
        '699d98642c564d2e855e9661899b7252', action: 'allow', name: 'block bad
        websites', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param:"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum:
                    - on
                    - off
                    - allow
                    - block
                    - scan
                    - noscan
                    - safesearch
                    - ytrestricted
                    - isolate
                    - noisolate
                    - override
                    - l4_override
                    - egress
                    - resolve
                    - quarantine
                    - redirect
                  description: "Body param: Specify the action to perform when the associated
                    traffic, identity, and device posture expressions either
                    absent or evaluate to `true`."
                name:
                  type: string
                  description: "Body param: Specify the rule name."
                description:
                  type: string
                  description: "Body param: Specify the rule description."
                device_posture:
                  type: string
                  description: "Body param: Specify the wirefilter expression used for device
                    posture check. The API automatically formats and sanitizes
                    expressions before storing them. To prevent Terraform state
                    drift, use the formatted expression returned in the API
                    response."
                enabled:
                  type: boolean
                  description: "Body param: Specify whether the rule is enabled."
                expiration:
                  oneOf:
                    - type: object
                      properties:
                        expires_at:
                          type: string
                          description: Show the timestamp when the policy expires and stops applying. The
                            value must follow RFC 3339 and include a UTC offset.
                            The system accepts non-zero offsets but converts
                            them to the equivalent UTC+00:00 value and returns
                            timestamps with a trailing Z. Expiration policies
                            ignore client timezones and expire globally at the
                            specified expires_at time.
                        duration:
                          type: number
                          description: Defines the default duration a policy active in minutes. Must set
                            in order to use the `reset_expiration` endpoint on
                            this rule.
                      required:
                        - expires_at
                  nullable: true
                  description: "Body param: Defines the expiration time stamp and default duration
                    of a DNS policy. Takes precedence over the policy's
                    `schedule` configuration, if any. This does not apply to
                    HTTP or network policies. Settable only for `dns` rules."
                filters:
                  type: array
                  items:
                    type: string
                    enum:
                      - http
                      - dns
                      - l4
                      - egress
                      - dns_resolver
                  description: "Body param: Specify the protocol or layer to evaluate the traffic,
                    identity, and device posture expressions. Can only contain a
                    single value."
                identity:
                  type: string
                  description: "Body param: Specify the wirefilter expression used for identity
                    matching. The API automatically formats and sanitizes
                    expressions before storing them. To prevent Terraform state
                    drift, use the formatted expression returned in the API
                    response."
                precedence:
