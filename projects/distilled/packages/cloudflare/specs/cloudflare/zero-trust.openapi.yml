  /accounts/{account_id}/dlp/patterns/validate:
    post:
      operationId: validateDlpPattern
      description: "Validates whether this pattern is a valid regular expression.
        Rejects it if the regular expression is too complex or can match an
        unbounded-length string. The regex will be rejected if it uses ` ` or
        `+`. Bound the maximum number of characters that can be matched using a
        range, e.g. `{1,100}`.  @example ```ts const response = await
        client.zeroTrust.dlp.patterns.validate({ account_id: 'account_id',
        regex: 'regex', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Account ID."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                regex:
                  type: string
                  description: "Body param:"
                max_match_bytes:
                  oneOf:
                    - type: number
                  nullable: true
                  description: "Body param: Maximum number of bytes that the regular expression
                    can match.  If this is `null` then there is no limit on the
                    length. Patterns can use ` ` and `+`. Otherwise repeats
                    should use a range `{m,n}` to restrict patterns to the
                    length. If this field is missing, then a default length
                    limit is used.  Note that the length is specified in bytes.
                    Since regular expressions use UTF-8 the pattern `.` can
                    match up to 4 bytes. Hence `.{1,256}` has a maximum length
                    of 1024 bytes."
              required:
                - regex
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                required:
                  - valid
      x-distilled-response-path: result
