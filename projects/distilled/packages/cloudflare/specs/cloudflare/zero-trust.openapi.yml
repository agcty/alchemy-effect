                        description: Whether the device settings profile was deleted.
                      name:
                        type: string
                        description: The name of the device settings profile.
                      updated_at:
                        type: string
                        description: The RFC3339 timestamp of when the device settings profile last
                          changed for the registration.
                    required:
                      - id
                      - default
                      - deleted
                      - name
                      - updated_at
                    description: The device settings profile assigned to this registration.
                  revoked_at:
                    oneOf:
                      - type: string
                    nullable: true
                    description: The RFC3339 timestamp when the registration was revoked.
                  tunnel_type:
                    oneOf:
                      - type: string
                    nullable: true
                    description: Type of the tunnel - wireguard or masque.
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        description: UUID.
                      email:
                        type: string
                        description: The contact email address of the user.
                      name:
                        type: string
                        description: The enrolled device user's name.
