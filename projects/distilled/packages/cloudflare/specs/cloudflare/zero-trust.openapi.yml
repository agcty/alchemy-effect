                      value in the `CF-Access-Client-ID` request header.
                  doh_jwt_duration:
                    type: string
                    description: "The duration the DoH JWT is valid for. Must be in the format
                      `300ms` or `2h45m`. Valid time units are: ns, us (or µs),
                      ms, s, m, h. Note that the maximum duration for this
                      setting is the same as the key rotation period on the
                      account."
