      description: "Updates an Access policy specific to an application. To update a
        reusable policy, use the /account or zones/{account or
        zone_id}/policies/{uid} endpoint.  @example ```ts const policy = await
        client.zeroTrust.access.applications.policies.update(
        'f174e90a-fafe-4643-bbbc-4a0ed4fc8415',
        'f174e90a-fafe-4643-bbbc-4a0ed4fc8415', { account_id: 'account_id' }, );
        ```"
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: policyId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: The Account ID to use for this endpoint. Mutually
            exclusive with the Zone ID."
          schema:
            type: string
