    post:
      operationId: createIdentityProvider
      description: "Adds a new identity provider to Access.  @example ```ts const
        identityProvider = await client.zeroTrust.identityProviders.create({
        config: {}, name: 'Widget Corps IDP', type: 'onetimepin', account_id:
        'account_id', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: The Account ID to use for this endpoint. Mutually
            exclusive with the Zone ID."
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: "Path param: The Zone ID to use for this endpoint. Mutually
            exclusive with the Account ID."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                config:
                  type: object
                  properties:
                    claims:
                      type: array
                      items:
                        type: string
                      description: Custom claims
                    client_id:
                      type: string
                      description: Your OAuth Client ID
                    client_secret:
                      type: string
                      description: Your OAuth Client Secret
                    conditional_access_enabled:
                      type: boolean
                      description: Should Cloudflare try to load authentication contexts from your
                        account
                    directory_id:
                      type: string
                      description: Your Azure directory uuid
                    email_claim_name:
                      type: string
                      description: The claim name for email in the id_token response.
                    prompt:
                      type: string
                      enum:
                        - login
                        - select_account
                        - none
                      description: Indicates the type of user interaction that is required.
                        prompt=login forces the user to enter their credentials
                        on that request, negating single-sign on. prompt=none is
                        the opposite. It ensures that the user isn't presented
                        with any interactive prompt. If the request can't be
                        completed silently by using single-sign on, the
                        Microsoft identity platform returns an
                        interaction_required error. prompt=select_account
                        interrupts single sign-on providing account selection
                        experience listing all the accounts either in session or
                        any remembered account or an option to choose to use a
                        different account altogether.
                    support_groups:
                      type: boolean
                      description: Should Cloudflare try to load groups from your account
                  description: "Body param: The configuration parameters for the identity
                    provider. To view the required parameters for a specific
                    provider, refer to our [developer
                    documentation](https://developers.cloudflare.com/cloudflare\
                    -one/identity/idp-integration/)."
                name:
                  type: string
                  description: "Body param: The name of the identity provider, shown to users on
                    the login page."
                type:
                  type: string
                  enum:
                    - google
                    - onetimepin
                    - azureAD
                    - saml
                    - centrify
                    - facebook
                    - github
                    - google-apps
                    - linkedin
                    - oidc
                    - okta
                    - onelogin
                    - pingone
                    - yandex
                  description: "Body param: The type of identity provider. To determine the value
                    for a specific provider, refer to our [developer
                    documentation](https://developers.cloudflare.com/cloudflare\
                    -one/identity/idp-integration/)."
                scim_config:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      description: A flag to enable or disable SCIM for the identity provider.
                    identity_update_behavior:
                      type: string
                      enum:
                        - automatic
                        - reauth
                        - no_action
                      description: Indicates how a SCIM event updates a user identity used for policy
                        evaluation. Use "automatic" to automatically update a
                        user's identity and augment it with fields from the SCIM
                        user resource. Use "reauth" to force re-authentication
                        on group membership updates, user identity update will
                        only occur after successful re-authentication. With
                        "reauth" identities will not contain fields from the
                        SCIM user resource. With "no_action" identities will not
                        be changed by SCIM updates in any way and users will not
                        be prompted to reauthenticate.
                    seat_deprovision:
                      type: boolean
                      description: A flag to remove a user's seat in Zero Trust when they have been
                        deprovisioned in the Identity Provider. This cannot be
                        enabled unless user_deprovision is also enabled.
                    user_deprovision:
                      type: boolean
                      description: A flag to enable revoking a user's session in Access and Gateway
                        when they have been deprovisioned in the Identity
                        Provider.
                  description: "Body param: The configuration settings for enabling a System for
                    Cross-Domain Identity Management (SCIM) with the identity
                    provider."
              required:
                - config
                - name
                - type
