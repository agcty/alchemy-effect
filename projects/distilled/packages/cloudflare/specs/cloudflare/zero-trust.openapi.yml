                    description: The UUID of the policy
                  approval_groups:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                    description: Administrators who can approve a temporary authentication request.
                  approval_required:
                    type: boolean
                    description: Requires the user to request access from an administrator at the
                      start of each session.
                  created_at:
                    type: string
                  decision:
                    type: string
                    enum:
                      - allow
                      - bypass
                      - deny
                      - non_identity
                    description: The action Access will take if a user matches this policy.
                      Infrastructure application policies can only use the Allow
                      action.
                  exclude:
                    type: array
