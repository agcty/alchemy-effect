                            description: Indicates the type of user interaction that is required.
                              prompt=login forces the user to enter their
                              credentials on that request, negating single-sign
                              on. prompt=none is the opposite. It ensures that
                              the user isn't presented with any interactive
                              prompt. If the request can't be completed silently
                              by using single-sign on, the Microsoft identity
                              platform returns an interaction_required error.
