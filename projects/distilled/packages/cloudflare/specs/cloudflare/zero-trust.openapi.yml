  /accounts/{account_id}/access/policy-tests/{policyTestId}:
    get:
      operationId: getAccessApplicationPolicyTest
      description: "Fetches the current status of a given Access policy
        test.  @example ```ts const policyTest = await
        client.zeroTrust.access.applications.policyTests.get(
        'f1a8b3c9d4e5f6789a0b1c2d3e4f5678a9b0c1d2e3f4a5b67890c1d2e3f4b5a6', {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: policyTestId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The UUID of the policy test.
                  percent_approved:
                    type: number
                    description: The percentage of (processed) users approved based on policy
                      evaluation results.
                  percent_blocked:
                    type: number
                    description: The percentage of (processed) users blocked based on policy
                      evaluation results.
                  percent_errored:
                    type: number
                    description: The percentage of (processed) users errored based on policy
                      evaluation results.
                  percent_users_processed:
                    type: number
                    description: The percentage of users processed so far (of the entire user base).
                  status:
                    type: string
                    enum:
                      - blocked
                      - processing
                      - exceeded time
                      - complete
                    description: The status of the policy test.
                  total_users:
                    type: number
                    description: The total number of users in the user base.
                  users_approved:
                    type: number
                    description: The number of (processed) users approved based on policy evaluation
                      results.
                  users_blocked:
                    type: number
                    description: The number of (processed) users blocked based on policy evaluation
                      results.
                  users_errored:
                    type: number
                    description: The number of (processed) users errored based on policy evaluation
                      results.
      x-distilled-response-path: result
  /accounts/{account_id}/access/policy-tests:
    post:
      operationId: createAccessApplicationPolicyTest
      description: "Starts an Access policy test.  @example ```ts const policyTest =
        await client.zeroTrust.access.applications.policyTests.create( {
        account_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                policies:
                  type: array
                  items:
                    oneOf:
                      - type: object
                        properties:
                          decision:
                            type: string
                            enum:
                              - allow
                              - bypass
                              - deny
                              - non_identity
                            description: The action Access will take if a user matches this policy.
                              Infrastructure application policies can only use
                              the Allow action.
                          include:
                            type: array
                            items:
                              oneOf:
                                - type: object
                                  additionalProperties: true
                                - type: object
                                  additionalProperties: true
                                - type: object
                                  additionalProperties: true
