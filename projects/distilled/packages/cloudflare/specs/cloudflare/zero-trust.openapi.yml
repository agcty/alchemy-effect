    delete:
      operationId: deleteTunnelCloudflaredConnection
      description: "Removes a connection (aka Cloudflare Tunnel Connector) from a
        Cloudflare Tunnel independently of its current state. If no connector id
        (client_id) is provided all connectors will be removed. We recommend
        running this command after rotating tokens.  @example ```ts const
        connection = await
        client.zeroTrust.tunnels.cloudflared.connections.delete(
        'f70ff985-a4ef-4643-bbbc-4a0ed4fc8415', { account_id:
        '699d98642c564d2e855e9661899b7252' }, ); ```"
      parameters:
        - name: tunnelId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Cloudflare account ID"
          schema:
            type: string
        - name: client_id
          in: query
          required: false
          description: "Query param: UUID of the Cloudflare Tunnel connector."
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
