  /{accountOrZone}/{accountOrZoneId}/access/apps/{appId}:
    get:
      operationId: getAccessApplication
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      domain:
                        type: string
                        description: The primary hostname and path secured by Access. This domain will
                          be displayed if the app is visible in the App
                          Launcher.
                      type:
                        type: string
                        enum:
                          - self_hosted
                          - saas
                          - ssh
                          - vnc
                          - app_launcher
                          - warp
                          - biso
                          - bookmark
                          - dash_sso
                          - infrastructure
                          - rdp
                          - mcp
                          - mcp_portal
                          - proxy_endpoint
                        description: The application type.
                      id:
                        type: string
                        description: UUID.
                      allow_authenticate_via_warp:
                        type: boolean
                        description: When set to true, users can authenticate to this application using
                          their WARP session. When set to false this application
                          will always require direct IdP authentication. This
                          setting always overrides the organization setting for
                          WARP authentication.
                      allow_iframe:
                        type: boolean
                        description: Enables loading application content in an iFrame.
                      allowed_idps:
                        type: array
                        items:
                          type: string
                        description: The identity providers your users can select when connecting to
                          this application. Defaults to all IdPs configured in
                          your account.
                      app_launcher_visible:
                        type: boolean
                        description: Displays the application in the App Launcher.
                      aud:
                        type: string
                        description: Audience tag.
                      auto_redirect_to_identity:
                        type: boolean
                        description: When set to `true`, users skip the identity provider selection step
                          during login. You must specify only one identity
                          provider in allowed_idps.
                      cors_headers:
                        type: object
                        additionalProperties: true
                      custom_deny_message:
                        type: string
                        description: The custom error message shown to a user when they are denied
                          access to the application.
                      custom_deny_url:
                        type: string
                        description: The custom URL a user is redirected to when they are denied access
                          to the application when failing identity-based rules.
                      custom_non_identity_deny_url:
                        type: string
                        description: The custom URL a user is redirected to when they are denied access
                          to the application when failing non-identity rules.
                      custom_pages:
                        type: array
                        items:
                          type: string
                        description: The custom pages that will be displayed when applicable for this
                          application
                      destinations:
                        type: array
                        items:
                          oneOf:
                            - type: object
                              properties:
                                type:
                                  type: string
                                  enum:
                                    - public
                                uri:
                                  type: string
                                  description: The URI of the destination. Public destinations' URIs can include a
                                    domain and path with
                                    [wildcards](https://developers.cloudflare.com/cloudflare-one/policies/access/app-paths/).
                            - type: object
                              properties:
                                cidr:
                                  type: string
                                  description: The CIDR range of the destination. Single IPs will be computed as
                                    /32.
                                hostname:
                                  type: string
                                  description: The hostname of the destination. Matches a valid SNI served by an
                                    HTTPS origin.
                                l4_protocol:
                                  type: string
                                  enum:
                                    - tcp
                                    - udp
                                  description: The L4 protocol of the destination. When omitted, both UDP and TCP
                                    traffic will match.
                                port_range:
                                  type: string
                                  description: The port range of the destination. Can be a single port or a range
                                    of ports. When omitted, all ports will
                                    match.
                                type:
                                  type: string
                                  enum:
                                    - private
                                vnet_id:
                                  type: string
                                  description: The VNET ID to match the destination. When omitted, all VNETs will
                                    match.
                            - type: object
                              properties:
                                mcp_server_id:
                                  type: string
                                  description: The MCP server id configured in ai-controls.
                                type:
                                  type: string
                                  enum:
                                    - via_mcp_server_portal
                        description: List of destinations secured by Access. This supersedes
                          `self_hosted_domains` to allow for more flexibility in
                          defining different types of domains. If `destinations`
                          are provided, then `self_hosted_domains` will be
                          ignored.
                      enable_binding_cookie:
                        type: boolean
                        description: Enables the binding cookie, which increases security against
                          compromised authorization tokens and CSRF attacks.
                      http_only_cookie_attribute:
                        type: boolean
                        description: Enables the HttpOnly cookie attribute, which increases security
                          against XSS attacks.
                      logo_url:
                        type: string
                        description: The image URL for the logo shown in the App Launcher dashboard.
                      name:
                        type: string
                        description: The name of the application.
                      options_preflight_bypass:
                        type: boolean
                        description: Allows options preflight requests to bypass Access authentication
                          and go directly to the origin. Cannot turn on if
                          cors_headers is set.
                      path_cookie_attribute:
                        type: boolean
                        description: Enables cookie paths to scope an application's JWT to the
                          application path. If disabled, the JWT will scope to
                          the hostname by default
                      policies:
