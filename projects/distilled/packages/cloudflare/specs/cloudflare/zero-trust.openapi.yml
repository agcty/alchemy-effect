  /accounts/{account_id}/gateway/rules/{ruleId}/reset_expiration:
    post:
      operationId: resetExpirationGatewayRule
      description: "Resets the expiration of a Zero Trust Gateway Rule if its duration
        elapsed and it has a default duration. The Zero Trust Gateway Rule must
        have values for both `expiration.expires_at` and
        `expiration.duration`.  @example ```ts const gatewayRule = await
        client.zeroTrust.gateway.rules.resetExpiration(
        'f174e90a-fafe-4643-bbbc-4a0ed4fc8415', { account_id:
        '699d98642c564d2e855e9661899b7252' }, ); ```"
      parameters:
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  action:
                    type: string
                    enum:
                      - on
                      - off
                      - allow
                      - block
                      - scan
                      - noscan
                      - safesearch
                      - ytrestricted
                      - isolate
                      - noisolate
                      - override
                      - l4_override
                      - egress
                      - resolve
                      - quarantine
                      - redirect
                    description: Specify the action to perform when the associated traffic,
                      identity, and device posture expressions either absent or
                      evaluate to `true`.
                  enabled:
                    type: boolean
                    description: Specify whether the rule is enabled.
                  filters:
                    type: array
                    items:
                      type: string
                      enum:
                        - http
                        - dns
                        - l4
                        - egress
                        - dns_resolver
                    description: Specify the protocol or layer to evaluate the traffic, identity,
                      and device posture expressions. Can only contain a single
                      value.
                  name:
                    type: string
                    description: Specify the rule name.
                  precedence:
                    type: number
                    description: Set the order of your rules. Lower values indicate higher
                      precedence. At each processing phase, evaluate applicable
                      rules in ascending order of this value. Refer to [Order of
                      enforcement](http://developers.cloudflare.com/learning-paths/secure-internet-traffic/understand-policies/order-of-enforcement/#manage-precedence-with-terraform)
                      to manage precedence via Terraform.
                  traffic:
                    type: string
                    description: Specify the wirefilter expression used for traffic matching. The
                      API automatically formats and sanitizes expressions before
                      storing them. To prevent Terraform state drift, use the
                      formatted expression returned in the API response.
                  id:
                    type: string
                    description: Identify the API resource with a UUID.
                  created_at:
                    type: string
                  deleted_at:
                    oneOf:
                      - type: string
                    nullable: true
                    description: Indicate the date of deletion, if any.
                  description:
                    type: string
                    description: Specify the rule description.
                  device_posture:
                    type: string
                    description: Specify the wirefilter expression used for device posture check.
                      The API automatically formats and sanitizes expressions
                      before storing them. To prevent Terraform state drift, use
                      the formatted expression returned in the API response.
                  expiration:
                    oneOf:
                      - type: object
                        properties:
                          expires_at:
                            type: string
                            description: Show the timestamp when the policy expires and stops applying. The
                              value must follow RFC 3339 and include a UTC
                              offset. The system accepts non-zero offsets but
                              converts them to the equivalent UTC+00:00 value
                              and returns timestamps with a trailing Z.
                              Expiration policies ignore client timezones and
                              expire globally at the specified expires_at time.
                          duration:
                            type: number
                            description: Defines the default duration a policy active in minutes. Must set
                              in order to use the `reset_expiration` endpoint on
                              this rule.
                          expired:
                            type: boolean
                            description: Indicates whether the policy is expired.
                        required:
                          - expires_at
                    nullable: true
                    description: Defines the expiration time stamp and default duration of a DNS
                      policy. Takes precedence over the policy's `schedule`
                      configuration, if any. This does not apply to HTTP or
                      network policies. Settable only for `dns` rules.
                  identity:
                    type: string
                    description: Specify the wirefilter expression used for identity matching. The
                      API automatically formats and sanitizes expressions before
                      storing them. To prevent Terraform state drift, use the
                      formatted expression returned in the API response.
                  read_only:
                    type: boolean
                    description: Indicate that this rule is shared via the Orgs API and read only.
                  rule_settings:
                    type: object
                    properties:
                      add_headers:
                        oneOf:
                          - type: object
                            additionalProperties: true
                        nullable: true
                        description: Add custom headers to allowed requests as key-value pairs. Use
                          header names as keys that map to arrays of header
                          values. Settable only for `http` rules with the action
                          set to `allow`.
                      allow_child_bypass:
                        oneOf:
                          - type: boolean
                        nullable: true
                        description: Set to enable MSP children to bypass this rule. Only parent MSP
                          accounts can set this. this rule. Settable for all
                          types of rules.
                      audit_ssh:
                        oneOf:
                          - type: object
                            properties:
                              command_logging:
                                type: boolean
                                description: Enable SSH command logging.
                        nullable: true
                        description: Define the settings for the Audit SSH action. Settable only for
                          `l4` rules with `audit_ssh` action.
                      biso_admin_controls:
                        type: object
                        properties:
                          copy:
                            type: string
                            enum:
                              - enabled
                              - disabled
                              - remote_only
                            description: Configure copy behavior. If set to remote_only, users cannot copy
                              isolated content from the remote browser to the
                              local clipboard. If this field is absent, copying
                              remains enabled. Applies only when version ==
                              "v2".
                          dcp:
                            type: boolean
                            description: Set to false to enable copy-pasting. Only applies when `version ==
                              "v1"`.
                          dd:
                            type: boolean
                            description: Set to false to enable downloading. Only applies when `version ==
                              "v1"`.
                          dk:
                            type: boolean
                            description: Set to false to enable keyboard usage. Only applies when `version
                              == "v1"`.
                          download:
                            type: string
                            enum:
                              - enabled
                              - disabled
                              - remote_only
                            description: Configure download behavior. When set to remote_only, users can
                              view downloads but cannot save them. Applies only
                              when version == "v2".
                          dp:
                            type: boolean
                            description: Set to false to enable printing. Only applies when `version ==
                              "v1"`.
                          du:
                            type: boolean
                            description: Set to false to enable uploading. Only applies when `version ==
                              "v1"`.
                          keyboard:
                            type: string
                            enum:
                              - enabled
                              - disabled
                            description: Configure keyboard usage behavior. If this field is absent,
                              keyboard usage remains enabled. Applies only when
                              version == "v2".
                          paste:
                            type: string
                            enum:
                              - enabled
                              - disabled
                              - remote_only
                            description: Configure paste behavior. If set to remote_only, users cannot paste
                              content from the local clipboard into isolated
                              pages. If this field is absent, pasting remains
                              enabled. Applies only when version == "v2".
                          printing:
                            type: string
                            enum:
                              - enabled
                              - disabled
                            description: Configure print behavior. Default, Printing is enabled. Applies
                              only when version == "v2".
                          upload:
                            type: string
                            enum:
                              - enabled
                              - disabled
                            description: Configure upload behavior. If this field is absent, uploading
                              remains enabled. Applies only when version ==
                              "v2".
                          version:
                            type: string
                            enum:
                              - v1
                              - v2
                            description: Indicate which version of the browser isolation controls should
                              apply.
                        description: Configure browser isolation behavior. Settable only for `http`
                          rules with the action set to `isolate`.
                      block_page:
                        oneOf:
                          - type: object
                            properties:
                              target_uri:
                                type: string
                                description: Specify the URI to which the user is redirected.
                              include_context:
