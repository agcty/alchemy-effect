  /zones/{zone_id}/cache/tiered_cache_smart_topology_enable:
    get:
      operationId: getSmartTieredCache
      description: "Smart Tiered Cache dynamically selects the single closest upper
        tier for each of your website’s origins with no configuration required,
        using our in-house performance and routing data. Cloudflare collects
        latency data for each request to an origin, and uses the latency data to
        determine how well any upper-tier data center is connected with an
        origin. As a result, Cloudflare can select the data center with the
        lowest latency to be the upper-tier for an origin.  @example ```ts const
        smartTieredCache = await client.cache.smartTieredCache.get({ zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    enum:
                      - tiered_cache_smart_topology_enable
                    description: The identifier of the caching setting.
                  editable:
                    type: boolean
                    description: Whether the setting is editable.
                  value:
                    type: string
                    enum:
                      - on
                      - off
                    description: Value of the Smart Tiered Cache zone setting.
                  modified_on:
                    oneOf:
