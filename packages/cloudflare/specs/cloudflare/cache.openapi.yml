        client.cache.cacheReserve.edit({ zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353', value: 'on', }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Identifier."
          schema:
