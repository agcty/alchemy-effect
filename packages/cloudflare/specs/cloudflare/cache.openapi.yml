  /zones/{zone_id}/cache/variants:
    get:
      operationId: getVariant
      description: "Variant support enables caching variants of images with certain
        file extensions in addition to the original. This only applies when the
        origin server sends the 'Vary: Accept' response header. If the origin
        server sends 'Vary: Accept' but does not serve the variant requested,
        the response will not be cached. This will be indicated with BYPASS
        cache status in the response headers.  @example ```ts const variant =
        await client.cache.variants.get({ zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    enum:
                      - variants
                    description: The identifier of the caching setting.
                  editable:
                    type: boolean
                    description: Whether the setting is editable.
                  value:
                    type: object
                    properties:
                      avif:
                        type: array
                        items:
