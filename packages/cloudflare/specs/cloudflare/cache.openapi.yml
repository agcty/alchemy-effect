openapi: 3.1.0
info:
  title: Cloudflare CACHE API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: cache
paths:
  /zones/{zone_id}/purge_cache:
    post:
      operationId: purgeCache
      description: "### Purge All Cached Content  Removes ALL files from Cloudflare's
        cache. All tiers can purge everything.  ``` {\"purge_everything\": true}
        ```  ### Purge Cached Content by URL  Granularly removes one or more
        files from Cloudflare's cache by specifying URLs. All tiers can purge by
        URL.  To purge files with custom cache keys, include the headers used to
        compute the cache key as in the example. If you have a device type or
        geo in your cache key, you will need to include the CF-Device-Type or
        CF-IPCountry headers. If you have lang in your cache key, you will need
        to include the Accept-Language header.    NB:  When including the Origin
        header, be sure to include the  scheme  and   hostname  . The port
        number can be omitted if it is the default port (80 for http, 443 for
        https), but must be included otherwise.  Single file purge example with
        files:  ``` {\"files\": [\"http://www.example.com/css/styles.css\",
        \"http://www.example.com/js/index.js\"]} ```  Single file purge example
        with url and header pairs:  ``` {\"files\": [{url:
        \"http://www.example.com/cat_picture.jpg\", headers: { \"CF-IPCountry\":
        \"US\", \"CF-Device-Type\": \"desktop\", \"Accept-Language\": \"zh-CN\"
        }}, {url: \"http://www.example.com/dog_picture.jpg\", headers: {
        \"CF-IPCountry\": \"EU\", \"CF-Device-Type\": \"mobile\",
        \"Accept-Language\": \"en-US\" }}]} ```  ### Purge Cached Content by
        Tag, Host or Prefix  Granularly removes one or more files from
        Cloudflare's cache either by specifying the host, the associated
        Cache-Tag, or a Prefix.  Flex purge with tags:  ``` {\"tags\":
        [\"a-cache-tag\", \"another-cache-tag\"]} ```  Flex purge with
        hosts:  ``` {\"hosts\": [\"www.example.com\", \"images.example.com\"]}
        ```  Flex purge with prefixes:  ``` {\"prefixes\":
        [\"www.example.com/foo\", \"images.example.com/bar/baz\"]} ```  ###
        Availability and limits  please refer to [purge cache availability and
        limits documentation
        page](https://developers.cloudflare.com/cache/how-to/purge-cache/#avail\
        ability-and-limits).  @example ```ts const response = await
        client.cache.purge({ zone_id: '023e105f4ecef8ad9ca31a8372d0c353', });
        ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param:"
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  type: array
                  items:
                    type: string
                  description: "Body param: For more information on cache tags and purging by
                    tags, please refer to [purge by cache-tags documentation
                    page](https://developers.cloudflare.com/cache/how-to/purge-\
                    cache/purge-by-tags/)."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                required:
                  - id
      x-distilled-response-path: result
  /zones/{zone_id}/cache/cache_reserve:
    get:
      operationId: getCacheReserve
      description: "Increase cache lifetimes by automatically storing all cacheable
        files into Cloudflare's persistent object storage buckets. Requires
        Cache Reserve subscription. Note: using Tiered Cache with Cache Reserve
        is highly recommended to reduce Reserve operations costs. See the
        [developer
        docs](https://developers.cloudflare.com/cache/about/cache-reserve) for
        more information.  @example ```ts const cacheReserve = await
        client.cache.cacheReserve.get({ zone_id:
        '023e105f4ecef8ad9ca31a8372d0c353', }); ```"
      parameters:
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    enum:
                      - cache_reserve
                    description: The identifier of the caching setting.
                  editable:
                    type: boolean
                    description: Whether the setting is editable.
                  value:
                    type: string
                    enum:
                      - on
                      - off
                    description: Value of the Cache Reserve zone setting.
                  modified_on:
                    oneOf:
                      - type: string
                    nullable: true
                    description: Last time this setting was modified.
                required:
                  - id
                  - editable
                  - value
      x-distilled-response-path: result
    patch:
      operationId: patchCacheReserve
      description: "Increase cache lifetimes by automatically storing all cacheable
        files into Cloudflare's persistent object storage buckets. Requires
