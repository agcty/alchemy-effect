openapi: 3.1.0
info:
  title: Cloudflare MTLS-CERTIFICATES API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: mtls-certificates
paths:
  /accounts/{account_id}/mtls_certificates/{mtlsCertificateId}/associations:
    get:
      operationId: getAssociation
      description: "Lists all active associations between the certificate and
        Cloudflare services.  @example ```ts // Automatically fetches more pages
        as needed. for await (const certificateAsssociation of
        client.mtlsCertificates.associations.get(
        '023e105f4ecef8ad9ca31a8372d0c353', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, )) { // ... } ```"
      parameters:
        - name: mtlsCertificateId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                    description: The service using the certificate.
                  status:
                    type: string
                    description: Certificate deployment status for the given service.
      x-distilled-pagination-class: CertificateAsssociationsSinglePage
  /accounts/{account_id}/mtls_certificates/{mtlsCertificateId}:
    get:
      operationId: getMtlsCertificate
      description: "Fetches a single mTLS certificate.  @example ```ts const
        mtlsCertificate = await client.mtlsCertificates.get(
        '023e105f4ecef8ad9ca31a8372d0c353', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: mtlsCertificateId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier.
                  ca:
                    type: boolean
                    description: Indicates whether the certificate is a CA or leaf certificate.
                  certificates:
                    type: string
                    description: The uploaded root CA certificate.
                  expires_on:
                    type: string
                    description: When the certificate expires.
                  issuer:
                    type: string
                    description: The certificate authority that issued the certificate.
                  name:
                    type: string
                    description: Optional unique name for the certificate. Only used for human
                      readability.
                  serial_number:
                    type: string
                    description: The certificate serial number.
                  signature:
                    type: string
                    description: The type of hash used for the certificate.
                  uploaded_on:
                    type: string
                    description: This is the time the certificate was uploaded.
      x-distilled-response-path: result
    delete:
      operationId: deleteMtlsCertificate
      description: "Deletes the mTLS certificate unless the certificate is in use by
        one or more Cloudflare services.  @example ```ts const mtlsCertificate =
        await client.mtlsCertificates.delete(
        '023e105f4ecef8ad9ca31a8372d0c353', { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: mtlsCertificateId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier.
                  ca:
                    type: boolean
                    description: Indicates whether the certificate is a CA or leaf certificate.
                  certificates:
                    type: string
                    description: The uploaded root CA certificate.
                  expires_on:
                    type: string
                    description: When the certificate expires.
                  issuer:
                    type: string
                    description: The certificate authority that issued the certificate.
                  name:
                    type: string
                    description: Optional unique name for the certificate. Only used for human
                      readability.
                  serial_number:
                    type: string
                    description: The certificate serial number.
                  signature:
                    type: string
                    description: The type of hash used for the certificate.
                  uploaded_on:
                    type: string
                    description: This is the time the certificate was uploaded.
      x-distilled-response-path: result
  /accounts/{account_id}/mtls_certificates:
    get:
      operationId: listMtlsCertificates
      description: "Lists all mTLS certificates.  @example ```ts // Automatically
        fetches more pages as needed. for await (const mtlsCertificate of
        client.mtlsCertificates.list( { account_id:
        '023e105f4ecef8ad9ca31a8372d0c353' }, )) { // ... } ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier.
                  ca:
                    type: boolean
                    description: Indicates whether the certificate is a CA or leaf certificate.
                  certificates:
                    type: string
                    description: The uploaded root CA certificate.
                  expires_on:
                    type: string
                    description: When the certificate expires.
                  issuer:
                    type: string
                    description: The certificate authority that issued the certificate.
                  name:
                    type: string
                    description: Optional unique name for the certificate. Only used for human
                      readability.
                  serial_number:
                    type: string
                    description: The certificate serial number.
                  signature:
                    type: string
                    description: The type of hash used for the certificate.
                  uploaded_on:
                    type: string
                    description: This is the time the certificate was uploaded.
      x-distilled-pagination-class: MTLSCertificatesSinglePage
