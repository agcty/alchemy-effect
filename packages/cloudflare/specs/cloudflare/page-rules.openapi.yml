openapi: 3.1.0
info:
  title: Cloudflare PAGE-RULES API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: page-rules
paths:
  /zones/{zone_id}/pagerules/{pageruleId}:
    get:
      operationId: getPageRule
      description: "Fetches the details of a Page Rule.  @example ```ts const pageRule
        = await client.pageRules.get( '023e105f4ecef8ad9ca31a8372d0c353', {
        zone_id: '023e105f4ecef8ad9ca31a8372d0c353' }, ); ```"
      parameters:
        - name: pageruleId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier.
                  actions:
                    type: array
                    items:
                      oneOf:
                        - type: object
                          additionalProperties: true
                        - type: object
                          additionalProperties: true
                        - type: object
                          additionalProperties: true
                        - type: object
                          additionalProperties: true
                        - type: object
                          properties:
                            id:
                              type: string
                              enum:
                                - bypass_cache_on_cookie
                              description: Bypass cache and fetch resources from the origin server if a
                                regular expression matches against a cookie name
                                present in the request.
                            value:
                              type: string
                              description: The regular expression to use for matching cookie names in the
                                request. Refer to [Bypass Cache on Cookie
                                setting](https://developers.cloudflare.com/rules/page-rules/reference/additional-reference/#bypass-cache-on-cookie-setting)
                                to learn about limited regular expression
                                support.
                        - type: object
                          properties:
                            id:
                              type: string
                              enum:
                                - cache_by_device_type
                              description: Separate cached content based on the visitor's device type.
                            value:
                              type: string
                              enum:
                                - on
                                - off
                              description: The status of Cache By Device Type.
                        - type: object
                          properties:
                            id:
                              type: string
                              enum:
                                - cache_deception_armor
                              description: Protect from web cache deception attacks while still allowing
                                static assets to be cached. This setting
                                verifies that the URL's extension matches the
                                returned `Content-Type`.
                            value:
                              type: string
                              enum:
                                - on
                                - off
                              description: The status of Cache Deception Armor.
                        - type: object
                          properties:
                            id:
                              type: string
                              enum:
                                - cache_key_fields
                              description: Control specifically what variables to include when deciding which
                                resources to cache. This allows customers to
                                determine what to cache based on something other
                                than just the URL.
                            value:
                              type: object
                              properties:
                                cookie:
                                  type: object
                                  properties:
                                    check_presence:
                                      type: array
                                      items:
                                        type: string
                                      description: A list of cookies to check for the presence of, without including
                                        their actual values.
                                    include:
                                      type: array
                                      items:
                                        type: string
                                      description: A list of cookies to include.
                                  description: Controls which cookies appear in the Cache Key.
                                header:
                                  type: object
                                  properties:
                                    check_presence:
                                      type: array
                                      items:
                                        type: string
                                      description: A list of headers to check for the presence of, without including
                                        their actual values.
                                    exclude:
                                      type: array
                                      items:
                                        type: string
                                      description: A list of headers to ignore.
                                    include:
                                      type: array
                                      items:
                                        type: string
                                      description: A list of headers to include.
                                  description: Controls which headers go into the Cache Key. Exactly one of
                                    `include` or `exclude` is expected.
                                host:
                                  type: object
                                  properties:
                                    resolved:
                                      type: boolean
                                      description: Whether to include the Host header in the HTTP request sent to the
                                        origin.
                                  description: Determines which host header to include in the Cache Key.
                                query_string:
                                  type: object
                                  properties:
                                    exclude:
                                      oneOf:
                                        - type: string
                                          enum:
                                            - "*"
                                        - type: array
                                          items:
                                            type: string
                                      description: Ignore all query string parameters.
                                    include:
                                      oneOf:
                                        - type: string
                                          enum:
                                            - "*"
                                        - type: array
                                          items:
                                            type: string
                                      description: Include all query string parameters.
                                  description: Controls which URL query string parameters go into the Cache Key.
