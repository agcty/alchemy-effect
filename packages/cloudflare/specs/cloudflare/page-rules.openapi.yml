                                  type: object
                                  properties:
                                    device_type:
                                      type: boolean
                                      description: Classifies a request as `mobile`, `desktop`, or `tablet` based on
                                        the User Agent.
                                    geo:
                                      type: boolean
                                      description: Includes the client's country, derived from the IP address.
                                    lang:
                                      type: boolean
                                      description: Includes the first language code contained in the `Accept-Language`
                                        header sent by the client.
