                                500. status_code matches the exact status code
                                from the origin web server. Valid status codes
                                are between 100-999. - `status_code_range`:
                                Integer values for from and to.
                                status_code_range matches any status code from
                                the origin web server within the specified
                                range. - `value`: An integer value that defines
                                the duration an asset is valid in seconds or one
                                of the following strings: no-store (equivalent
                                to -1), no-cache (equivalent to 0)."
