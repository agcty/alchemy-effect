                                in the Cloudflare network before being marked as
                                stale or discarded from cache. Status codes are
                                returned by a resource's origin. Setting cache
                                TTL based on response status overrides the
                                default cache behavior (standard caching) for
                                static files and overrides cache instructions
                                sent by the origin web server. To cache
                                non-static assets, set a Cache Level of Cache
                                Everything using a Page Rule. Setting no-store
                                Cache-Control or a low TTL (using
                                `max-age`/`s-maxage`) increases requests to
                                origin web servers and decreases performance.
