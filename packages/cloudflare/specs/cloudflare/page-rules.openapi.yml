                    description: The timestamp of when the Page Rule was created.
                  modified_on:
                    type: string
                    description: The timestamp of when the Page Rule was last modified.
                  priority:
                    type: number
                    description: "The priority of the rule, used to define which Page Rule is
                      processed over another. A higher number indicates a higher
                      priority. For example, if you have a catch-all Page Rule
                      (rule A: `/images/ `) but want a more specific Page Rule
                      to take precedence (rule B: `/images/special/ `), specify
                      a higher priority for rule B so it overrides rule A."
                  status:
                    type: string
                    enum:
                      - active
                      - disabled
                    description: The status of the Page Rule.
                  targets:
                    type: array
                    items:
                      type: object
                      properties:
                        constraint:
                          type: object
                          properties:
                            operator:
                              type: string
                              enum:
                                - matches
                                - contains
                                - equals
                                - not_equal
                                - not_contain
                              description: The matches operator can use asterisks and pipes as wildcard and
                                'or' operators.
                            value:
                              type: string
                              description: The URL pattern to match against the current request. The pattern
                                may contain up to four asterisks ('\ ') as
                                placeholders.
                          required:
                            - operator
                            - value
                          description: String constraint.
                        target:
                          type: string
                          enum:
                            - url
                          description: A target based on the URL of the request.
                    description: The rule targets to evaluate on each request.
                required:
                  - id
                  - actions
                  - created_on
                  - modified_on
                  - priority
                  - status
                  - targets
