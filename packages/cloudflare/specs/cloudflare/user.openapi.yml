    post:
      operationId: createToken
      description: "Create a new access token.  @example ```ts const token = await
        client.user.tokens.create({ name: 'readonly token', policies: [ {
        effect: 'allow', permission_groups: [ { id:
        'c8fed203ed3043cba015a93ad1616f1f' }, { id:
        '82e64a83756745bbbb1c9c2701bf816b' }, ], resources: { foo: 'string' },
        }, ], }); ```"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Token name.
                policies:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                  description: List of access policies assigned to the token.
                condition:
                  type: object
                  properties:
                    request_ip:
                      type: object
                      properties:
                        in:
                          type: array
                          items:
                            type: string
                          description: List of IPv4/IPv6 CIDR addresses.
                        not_in:
                          type: array
                          items:
                            type: string
                          description: List of IPv4/IPv6 CIDR addresses.
                      description: Client IP restrictions.
                expires_on:
                  type: string
                  description: The expiration time on or after which the JWT MUST NOT be accepted
                    for processing.
                not_before:
                  type: string
                  description: The time before which the token MUST NOT be accepted for
                    processing.
              required:
                - name
                - policies
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Token identifier tag.
                  condition:
                    type: object
                    properties:
                      request_ip:
                        type: object
                        properties:
                          in:
                            type: array
                            items:
                              type: string
                            description: List of IPv4/IPv6 CIDR addresses.
                          not_in:
                            type: array
                            items:
                              type: string
                            description: List of IPv4/IPv6 CIDR addresses.
                        description: Client IP restrictions.
                  expires_on:
                    type: string
                    description: The expiration time on or after which the JWT MUST NOT be accepted
                      for processing.
                  issued_on:
                    type: string
                    description: The time on which the token was created.
                  last_used_on:
                    type: string
                    description: Last time the token was used.
                  modified_on:
                    type: string
                    description: Last time the token was modified.
                  name:
                    type: string
                    description: Token name.
                  not_before:
                    type: string
                    description: The time before which the token MUST NOT be accepted for
                      processing.
                  policies:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                    description: List of access policies assigned to the token.
                  status:
                    type: string
                    enum:
                      - active
                      - disabled
                      - expired
                    description: Status of the token.
                  value:
                    type: string
                    description: The token value.
      x-distilled-response-path: result
