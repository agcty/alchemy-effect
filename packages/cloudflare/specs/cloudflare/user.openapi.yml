  /user/invites/{inviteId}:
    get:
      operationId: getInvite
      description: Gets the details of an invitation.  @example ```ts const invite =
        await client.user.invites.get( '4f5f0c14a2a41d5063dd301b2f829f04', );
        ```
      parameters:
        - name: inviteId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  invited_member_id:
                    oneOf:
                      - type: string
                    nullable: true
                    description: ID of the user to add to the organization.
                  organization_id:
                    type: string
                    description: ID of the organization the user will be added to.
                  id:
                    type: string
                    description: Invite identifier tag.
                  expires_on:
                    type: string
                    description: When the invite is no longer active.
                  invited_by:
                    type: string
                    description: The email address of the user who created the invite.
                  invited_member_email:
                    type: string
                    description: Email address of the user to add to the organization.
                  invited_on:
                    type: string
                    description: When the invite was sent.
                  organization_is_enforcing_twofactor:
                    type: boolean
                  organization_name:
                    type: string
                    description: Organization name.
                  roles:
                    type: array
                    items:
                      type: string
                    description: List of role names the membership has for this account.
                  status:
                    type: string
                    enum:
                      - pending
                      - accepted
                      - rejected
                      - expired
                    description: Current status of the invitation.
                required:
                  - invited_member_id
                  - organization_id
      x-distilled-response-path: result
    patch:
      operationId: patchInvite
      description: "Responds to an invitation.  @example ```ts const invite = await
        client.user.invites.edit( '4f5f0c14a2a41d5063dd301b2f829f04', { status:
        'accepted' }, ); ```"
      parameters:
        - name: inviteId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                    - accepted
                    - rejected
                  description: Status of your response to the invitation (rejected or accepted).
              required:
                - status
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  invited_member_id:
                    oneOf:
                      - type: string
                    nullable: true
                    description: ID of the user to add to the organization.
                  organization_id:
                    type: string
                    description: ID of the organization the user will be added to.
                  id:
                    type: string
                    description: Invite identifier tag.
                  expires_on:
                    type: string
                    description: When the invite is no longer active.
                  invited_by:
                    type: string
                    description: The email address of the user who created the invite.
                  invited_member_email:
                    type: string
                    description: Email address of the user to add to the organization.
                  invited_on:
                    type: string
                    description: When the invite was sent.
                  organization_is_enforcing_twofactor:
                    type: boolean
                  organization_name:
                    type: string
                    description: Organization name.
                  roles:
                    type: array
                    items:
                      type: string
                    description: List of role names the membership has for this account.
                  status:
                    type: string
                    enum:
                      - pending
                      - accepted
                      - rejected
                      - expired
                    description: Current status of the invitation.
                required:
                  - invited_member_id
                  - organization_id
      x-distilled-response-path: result
